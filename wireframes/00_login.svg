<svg width="1280" height="800" viewBox="0 0 1280 800" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', sans-serif">

  <!-- Background split -->
  <rect width="1280" height="800" fill="#F4F7FA"/>

  <!-- Left panel (brand) -->
  <rect width="560" height="800" fill="#1B5E88"/>

  <!-- Decorative circles background -->
  <circle cx="80" cy="120" r="180" fill="#2E88C4" opacity="0.15"/>
  <circle cx="500" cy="700" r="220" fill="#1B5E88" stroke="#2E88C4" stroke-width="1" opacity="0.3"/>
  <circle cx="460" cy="80" r="80" fill="#5AB0E0" opacity="0.1"/>
  <circle cx="60" cy="680" r="120" fill="#5AB0E0" opacity="0.08"/>

  <!-- Brand content -->
  <text x="60" y="310" fill="#FFFFFF" font-size="42" font-weight="700">StockEasy</text>
  <text x="62" y="344" fill="rgba(255,255,255,0.6)" font-size="16">Gestão de comércio simplificada</text>

  <!-- Divider line -->
  <line x1="60" y1="368" x2="200" y2="368" stroke="#5AB0E0" stroke-width="2"/>

  <!-- Features list -->
  <circle cx="76" cy="406" r="6" fill="#5AB0E0"/>
  <text x="96" y="411" fill="rgba(255,255,255,0.8)" font-size="14">Controle de estoque em tempo real</text>

  <circle cx="76" cy="440" r="6" fill="#5AB0E0"/>
  <text x="96" y="445" fill="rgba(255,255,255,0.8)" font-size="14">Gestão de vendas e fornecedores</text>

  <circle cx="76" cy="474" r="6" fill="#5AB0E0"/>
  <text x="96" y="479" fill="rgba(255,255,255,0.8)" font-size="14">Relatórios e alertas automáticos</text>

  <!-- Footer left -->
  <text x="60" y="760" fill="rgba(255,255,255,0.3)" font-size="11">v1.0 — SENAC Franca</text>

  <!-- Right panel (form) -->
  <!-- Form card -->
  <rect x="640" y="0" width="640" height="800" fill="#F4F7FA"/>

  <!-- Centered form box -->
  <rect x="720" y="180" width="480" height="440" rx="12" fill="#FFFFFF" stroke="#E2E8EF" stroke-width="1"/>

  <!-- Form header -->
  <text x="960" y="240" fill="#1A1A2E" font-size="22" font-weight="600" text-anchor="middle">Entrar na sua conta</text>
  <text x="960" y="264" fill="#5A6A7A" font-size="13" text-anchor="middle">Informe suas credenciais para continuar</text>

  <line x1="740" y1="282" x2="1180" y2="282" stroke="#E2E8EF" stroke-width="1"/>

  <!-- E-mail field -->
  <text x="744" y="314" fill="#5A6A7A" font-size="12">E-mail</text>
  <rect x="744" y="322" width="432" height="40" rx="7" fill="#F4F7FA" stroke="#E2E8EF" stroke-width="1.5"/>
  <text x="762" y="347" fill="#5A6A7A" font-size="13">admin@stockeasy.com</text>

  <!-- Password field -->
  <text x="744" y="386" fill="#5A6A7A" font-size="12">Senha</text>
  <rect x="744" y="394" width="432" height="40" rx="7" fill="#F4F7FA" stroke="#E2E8EF" stroke-width="1.5"/>
  <!-- Password dots -->
  <circle cx="764" cy="414" r="4" fill="#5A6A7A"/>
  <circle cx="780" cy="414" r="4" fill="#5A6A7A"/>
  <circle cx="796" cy="414" r="4" fill="#5A6A7A"/>
  <circle cx="812" cy="414" r="4" fill="#5A6A7A"/>
  <circle cx="828" cy="414" r="4" fill="#5A6A7A"/>
  <circle cx="844" cy="414" r="4" fill="#5A6A7A"/>
  <!-- Eye icon -->
  <ellipse cx="1156" cy="414" rx="10" ry="7" fill="none" stroke="#5A6A7A" stroke-width="1.5"/>
  <circle cx="1156" cy="414" r="3" fill="#5A6A7A"/>

  <!-- Remember me + Forgot -->
  <rect x="744" y="450" width="14" height="14" rx="3" fill="#2E88C4"/>
  <text x="763" y="463" fill="#5A6A7A" font-size="12">Lembrar de mim</text>
  <text x="1060" y="463" fill="#2E88C4" font-size="12">Esqueci minha senha</text>

  <!-- Login button -->
  <rect x="744" y="480" width="432" height="44" rx="8" fill="#2E88C4"/>
  <text x="960" y="507" fill="#FFFFFF" font-size="14" font-weight="600" text-anchor="middle">Entrar</text>

  <!-- Divider -->
  <line x1="744" y1="546" x2="920" y2="546" stroke="#E2E8EF" stroke-width="1"/>
  <rect x="920" y="536" width="80" height="20" fill="#FFFFFF"/>
  <text x="960" y="551" fill="#5A6A7A" font-size="11" text-anchor="middle">ou acesse com</text>
  <line x1="1000" y1="546" x2="1176" y2="546" stroke="#E2E8EF" stroke-width="1"/>

  <!-- Secondary button -->
  <rect x="744" y="566" width="432" height="40" rx="8" fill="#FFFFFF" stroke="#E2E8EF" stroke-width="1.5"/>
  <text x="960" y="591" fill="#5A6A7A" font-size="13" text-anchor="middle">🔑  Código de acesso institucional</text>

  <!-- Footer form -->
  <text x="960" y="760" fill="#5A6A7A" font-size="11" text-anchor="middle">StockEasy · Wireframe · Login · SENAC Franca</text>

</svg>
